<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PlixTrade Pro — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;
  --text:#e6edf3;--sub:#7d8590;
  --green:#3fb950;--red:#f85149;--blue:#388bfd;--gold:#f0b429;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
     min-height:100vh;display:flex;align-items:center;justify-content:center;
     background-image:radial-gradient(ellipse at 20% 50%,#162032 0%,transparent 60%),
                      radial-gradient(ellipse at 80% 20%,#1a1a2e 0%,transparent 60%)}
.wrap{width:100%;max-width:460px;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.logo h1 span{color:var(--gold)}
.logo p{color:var(--sub);font-size:13px;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:14px;font-weight:500;
     color:var(--sub);border-bottom:2px solid transparent;transition:.2s;margin-bottom:-1px}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.form-group{margin-bottom:16px}
label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;background:#0d1117;border:1px solid var(--border);border-radius:8px;
      padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:.2s}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(56,139,253,.1)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;
     cursor:pointer;transition:.2s;margin-top:8px}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:#e0a820;transform:translateY(-1px)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.msg.error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.msg.success{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.divider{text-align:center;color:var(--sub);font-size:12px;margin:8px 0}
.ticker{display:flex;gap:12px;overflow:hidden;margin-top:24px;padding:12px 0;
        border-top:1px solid var(--border)}
.tick{font-size:12px;color:var(--sub);white-space:nowrap}
.tick span{color:var(--green)}
.tick span.dn{color:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <h1>Plix<span>Trade</span> Pro</h1>
    <p>Professional Trading Platform v2.0</p>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Sign In</div>
      <div class="tab" onclick="switchTab('register')">Create Account</div>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In to Trade</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="John Doe"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="text" id="regPhone" placeholder="+91 9876543210"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="Min 6 characters"/>
      </div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
      <div id="regMsg" class="msg"></div>
    </div>
  </div>

  <div class="ticker" id="ticker"></div>
</div>

<script>
const API = '';

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='login')||(i===1&&t==='register')));
  document.getElementById('loginForm').style.display    = t==='login'    ? 'block' : 'none';
  document.getElementById('registerForm').style.display = t==='register' ? 'block' : 'none';
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `msg ${type}`; el.style.display='block';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!email || !password) return showMsg('loginMsg','Enter email and password','error');
  try {
    const r = await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const d = await r.json();
    if (!r.ok) return showMsg('loginMsg', d.error, 'error');
    localStorage.setItem('pt_token', d.token);
    localStorage.setItem('pt_user', JSON.stringify(d.user));
    showMsg('loginMsg','Login successful! Redirecting...','success');
    setTimeout(() => {
      window.location.href = d.user.role === 'admin' ? '/admin/dashboard' : '/user/dashboard';
    }, 700);
  } catch(e) { showMsg('loginMsg','Server error. Is the server running?','error'); }
}

async function doRegister() {
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const phone=document.getElementById('regPhone').value.trim();
  const password=document.getElementById('regPass').value;
  if (!name||!email||!password) return showMsg('regMsg','All fields required','error');
  try {
    const r = await fetch(`${API}/api/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,phone,password})});
    const d = await r.json();
    if (!r.ok) return showMsg('regMsg', d.error, 'error');
    localStorage.setItem('pt_token', d.token);
    localStorage.setItem('pt_user', JSON.stringify(d.user));
    showMsg('regMsg','Account created! Redirecting...','success');
    setTimeout(() => window.location.href='/user/dashboard', 800);
  } catch(e) { showMsg('regMsg','Server error.','error'); }
}

// Live ticker simulation
const tickers = [
  ['EUR/USD','1.0851'],['GBP/USD','1.2648'],['XAU/USD','2021.5'],
  ['BTC/USD','43,512'],['ETH/USD','2,281'],['USD/JPY','149.52']
];
function buildTicker() {
  document.getElementById('ticker').innerHTML = tickers.map(([p,v]) =>
    `<div class="tick">${p} <span class="${Math.random()>.5?'':'dn'}">${v}</span></div>`
  ).join('');
}
buildTicker();
setInterval(buildTicker, 3000);

// Auto-redirect if already logged in
const tok = localStorage.getItem('pt_token');
const usr = JSON.parse(localStorage.getItem('pt_user')||'null');
if (tok && usr) window.location.href = usr.role==='admin' ? '/admin/dashboard' : '/user/dashboard';
</script>
</body>
</html>
