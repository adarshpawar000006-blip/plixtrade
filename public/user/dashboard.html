<!DOCTYPE html>
<html>
<head>
  <title>PlixTrade Dashboard</title>
</head>
<body style="background:black;color:white;font-family:sans-serif">

<h2>Open Trades</h2>
<div id="trades"></div>

<!-- CLOSE POPUP -->
<div id="closePopup" style="display:none;position:fixed;top:40%;left:30%;background:#222;padding:20px;border-radius:10px;">
  <h3>Confirm Close</h3>
  <button onclick="confirmClose()">YES</button>
  <button onclick="closePopup()">NO</button>
</div>

<script>
const token = localStorage.getItem('pt_token') || localStorage.getItem('token');

let selectedTradeId = null;

// LOAD TRADES
async function loadTrades() {
  const res = await fetch('/api/trades/open', {
    headers: {
      'Authorization': 'Bearer ' + token
    }
  });

  const trades = await res.json();

  let html = '';

  trades.forEach(t => {
    html += `
      <div style="border:1px solid white;margin:10px;padding:10px">
        <p>${t.symbol}</p>
        <p>Lot: ${t.lot}</p>
        <button onclick="openClosePopup(${t.id})">Close</button>
      </div>
    `;
  });

  document.getElementById('trades').innerHTML = html;
}

// OPEN POPUP
function openClosePopup(id) {
  selectedTradeId = id;
  document.getElementById('closePopup').style.display = 'block';
}

// CLOSE POPUP UI
function closePopup() {
  document.getElementById('closePopup').style.display = 'none';
}

// CONFIRM CLOSE TRADE
async function confirmClose() {
  if (!selectedTradeId) {
    alert('No trade selected');
    return;
  }

  try {
    const res = await fetch(`/api/trades/${selectedTradeId}/close`, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token
      }
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || 'Close failed');
      return;
    }

    alert('Trade Closed Successfully');

    closePopup();
    loadTrades();

  } catch (err) {
    alert('Server error');
  }
}

// AUTO LOAD
loadTrades();
</script>

</body>
</html>
